
# ==========================================
# 1. SISTEMA BÁSICO E PERIFÉRICOS
# ==========================================
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=n

CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n

# ==========================================
# 2. RELÓGIO
# ==========================================
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=n
CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=n
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC_CALIBRATION=n

# ==========================================
# 3. MEMÓRIA E STACKS
# ==========================================
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=4096

# ==========================================
# 4. BLUETOOTH
# ==========================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Aqualog_nRF54_V2"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_CTLR_TX_PWR_0=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_L2CAP_TX_MTU=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_L2CAP_TX_BUF_COUNT=5

# ==========================================
# 5. RELÓGIO E GRTC
# ==========================================
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_NRF=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_20PPM=y
CONFIG_NRFX_GRTC=y
CONFIG_NRF_GRTC_TIMER=y
CONFIG_POSIX_API=y
CONFIG_POSIX_TIMERS=y

# ==========================================
# 6. SD CARD E LORA
# ==========================================
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_SPI=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_LORA=y
CONFIG_LORA_SX127X=y
CONFIG_LORAWAN=y
CONFIG_LORAMAC_REGION_EU868=y
CONFIG_LORAWAN_PUBLIC_NETWORK=y

# ==========================================
# 7. BIBLIOTECAS
# ==========================================
CONFIG_LOG=n
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# ==========================================
# 8. DRIVERS NORDIC
# ==========================================
CONFIG_NRFX_GPIOTE20=n
CONFIG_NRFX_TIMER20=n

# ==========================================
# 9. NPM1300 E SETTINGS
# ==========================================
CONFIG_WATCHDOG=n
CONFIG_TASK_WDT=n
CONFIG_REGULATOR=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# ==========================================
# 10. GESTÃO DE ENERGIA
# ==========================================
CONFIG_PM_DEVICE=y
CONFIG_PM=y
CONFIG_POWEROFF=y
# ==========================================
# 11. BATERIA E NPM1300 (ZEPHYR v3.x)
# ==========================================
CONFIG_I2C=y
CONFIG_SENSOR=y

# A raiz do sistema MFD no Zephyr 3.x
CONFIG_MFD=y

# Ao ativar o MFD_NPM1300, o Kconfig da Nordic ativa automaticamente 
# os sub-módulos (Charger e Regulator) se os vir no Device Tree.


# Ativação explícita do Carregador

CONFIG_CHARGER=y  
CONFIG_ADC=y
CONFIG_NRF_FUEL_GAUGE=y
# TESTE PARA VER SE DIMINUI O CONSUMO PICO DE 2mA DE MINUTO EM MINUTO (120000ms = 2min)------->>>>>>>  CONFIG_MPSL_CALIBRATION_PERIOD=120000
